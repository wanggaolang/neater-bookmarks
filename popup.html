<!DOCTYPE html>
<meta charset="UTF-8">
<link rel="stylesheet" href="neat.css">
<div id="container">
	<div id="search" role="search"><input id="search-input" type="search" results="0" autofocus><div id="search-mode-hint"></div></div>
	<div id="tree" tabindex="-1"></div>
	<div id="results" tabindex="-1" style="display: none"></div>
</div>
<div id="bookmark-count" title="Total bookmarks"></div>
<div id="drop-overlay"></div>
<div id="bookmark-clone"></div>
<ul id="bookmark-context-menu" class="context-menu" tabindex="-1">
	<li id="bookmark-new-tab" tabindex="-1"></li>
	<li id="bookmark-new-window" tabindex="-1"></li>
	<li id="bookmark-new-incognito-window" tabindex="-1"></li>
	<hr>
	<li id="bookmark-edit" tabindex="-1"></li>
	<li id="bookmark-delete" tabindex="-1"></li>
</ul>
<ul id="folder-context-menu" class="context-menu" tabindex="-1">
	<li id="folder-window" tabindex="-1"></li>
	<li id="folder-new-window" tabindex="-1"></li>
	<li id="folder-new-incognito-window" tabindex="-1"></li>
	<hr>
	<li id="folder-edit" tabindex="-1"></li>
	<li id="folder-delete" tabindex="-1"></li>
</ul>
<div id="resizer"></div>
<div id="cover"></div>
<div id="alert-dialog" class="dialog" role="dialog">
	<p id="alert-dialog-text" class="dialog-text"></p>
</div>
<div id="confirm-dialog" class="dialog" role="dialog">
	<p id="confirm-dialog-text" class="dialog-text"></p>
	<div class="buttons">
	<button id="confirm-dialog-button-1"></button>
	<button id="confirm-dialog-button-2"></button>
	</div>
</div>
<div id="edit-dialog" class="dialog" role="dialog">
	<form>
	<p id="edit-dialog-text" class="dialog-text"></p>
	<input id="edit-dialog-name">
	<input type="url" id="edit-dialog-url" aria-required="true" required>
	<div class="buttons">
	<button id="edit-dialog-button" type="submit"></button>
	</div>
	</form>
</div>
<script src="neatools.js"></script>
<script src="neat.js"></script>
